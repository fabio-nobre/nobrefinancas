<ng-container *ngIf="lancamentos().length === 0">

  <tr>
    <td colspan="7" class="text-center py-8 text-gray-400">
      Nenhum lançamento cadastrado
    </td>
  </tr>

</ng-container>

<ng-container *ngIf="lancamentos().length > 0">

  <tr *ngFor="let l of lancamentos()" class="hover:bg-gray-50">

    <td class="px-4 py-3">
      {{ l.descricao }}
    </td>

    <td class="px-4 py-3">
      {{ l.categoriaId || '-' }}
    </td>

    <td class="px-4 py-3">
      {{ l.contaId || '-' }}
    </td>

    <td class="px-4 py-3">
      {{ l.data | date:'dd/MM/yyyy' }}
    </td>

    <td class="px-4 py-3 text-right font-medium">
      {{ l.valor | currency:'BRL' }}
    </td>

    <td class="px-4 py-3 text-center">

      <span *ngIf="l.tipo === 'RECEITA'" class="bg-green-100 text-green-700 text-xs px-2 py-1 rounded">

        Receita

      </span>

      <span *ngIf="l.tipo === 'DESPESA'" class="bg-red-100 text-red-700 text-xs px-2 py-1 rounded">

        Despesa

      </span>

    </td>

    <td class="px-4 py-3 text-right space-x-2">

      <button (click)="editar(l)" class="text-blue-600 hover:underline">

        Editar

      </button>

      <button (click)="remover(l.id)" class="text-red-600 hover:underline">

        Excluir

      </button>

    </td>

  </tr>

</ng-container>
