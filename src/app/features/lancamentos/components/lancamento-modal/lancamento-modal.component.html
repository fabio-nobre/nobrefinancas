<div class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center">

  <div class="bg-white rounded-2xl p-6 w-full max-w-md">

    <h2 class="text-xl font-semibold mb-4">
      Novo Lançamento
    </h2>

    <app-lancamento-form></app-lancamento-form>

    <div class="flex justify-between mt-6">

      <!-- ESQUERDA -->
      <button *ngIf="isEdicao" (click)="excluir()" class="px-4 py-2 bg-red-600 text-white rounded">
        Excluir
      </button>

      <!-- DIREITA -->
      <div class="flex gap-2">

        <button (click)="cancelar()" class="px-4 py-2 border rounded">
          Cancelar
        </button>

        <button (click)="salvar()" class="px-4 py-2 bg-blue-600 text-white rounded">
          {{ isEdicao ? 'Atualizar' : 'Salvar' }}
        </button>

      </div>

    </div>

  </div>
</div>
