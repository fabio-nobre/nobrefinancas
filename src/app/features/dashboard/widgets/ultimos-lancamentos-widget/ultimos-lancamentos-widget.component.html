<div class="bg-white rounded-lg shadow p-4 h-full">

  <h3 class="text-lg font-semibold mb-4 text-gray-700">
    Últimos lançamentos
  </h3>

  <div *ngFor="let grupo of lancamentosAgrupados()">

    <!-- categoria -->
    <div class="text-xs font-semibold text-gray-500 mt-3 mb-2">
      {{ grupo.categoria }}
    </div>

    <!-- itens -->
    <div *ngFor="let l of grupo.lancamentos" class="flex justify-between items-center py-2 border-b text-sm">

      <span class="text-gray-700">
        {{ l.descricao }}
      </span>

      <span [class.text-red-500]="l.tipo === 'DESPESA'" [class.text-green-600]="l.tipo === 'RECEITA'"
        class="font-semibold">

        {{ l.valor | currency:'BRL' }}

      </span>

    </div>

  </div>

</div>
