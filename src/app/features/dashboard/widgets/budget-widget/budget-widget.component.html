<div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5 h-full flex flex-col">

  <!-- HEADER -->
  <div class="mb-4">
    <h2 class="text-base font-semibold text-gray-900">
      Orçamento por Categoria
    </h2>
  </div>

  <!-- LISTA -->
  <div class="space-y-4 flex-1">

    <div *ngFor="let b of budgets()" class="bg-gray-50 rounded-lg p-3 space-y-2 border border-gray-100">

      <!-- TOP -->
      <div class="flex justify-between items-center">

        <span class="font-medium text-gray-700 text-sm">
          {{ b.categoria }}
        </span>

        <span class="text-xs font-semibold" [ngClass]="{
            'text-green-600': b.percentual < 80,
            'text-amber-600': b.percentual >= 80 && b.percentual < 100,
            'text-red-600': b.percentual >= 100
          }">

          {{ b.percentual | number:'1.0-0' }}%

        </span>

      </div>

      <!-- BARRA -->
      <div class="w-full h-2 bg-gray-200 rounded-full overflow-hidden">

        <div class="h-full transition-all duration-500" [style.width.%]="b.percentual" [ngClass]="{
            'bg-green-500': b.percentual < 80,
            'bg-amber-400': b.percentual >= 80 && b.percentual < 100,
            'bg-red-500': b.percentual >= 100
          }">
        </div>

      </div>

      <!-- VALORES -->
      <div class="flex justify-between text-xs text-gray-500">

        <span>
          {{ b.gastoAtual | currency:'BRL' }}
        </span>

        <span>
          {{ b.limite | currency:'BRL' }}
        </span>

      </div>

      <!-- PROJEÇÃO -->
      <div class="text-xs text-gray-400">
        Projeção: {{ b.projecao | currency:'BRL' }}
      </div>

    </div>

  </div>

</div>
