<div class="bg-white rounded-lg shadow p-4">

  <h3 class="text-lg font-semibold mb-4 text-gray-700">
    Orçamento por categoria
  </h3>

  <div *ngFor="let item of orcamento()" class="mb-4">

    <!-- HEADER -->
    <div class="flex justify-between text-sm mb-1">
      <span>{{ item.categoria }}</span>
      <span>{{ item.gasto | currency:'BRL' }} / {{ item.limite | currency:'BRL' }}</span>
    </div>

    <!-- BARRA -->
    <div class="w-full bg-gray-200 rounded h-2">

      <div class="h-2 rounded" [style.width.%]="item.percentual" [class.bg-green-500]="item.status === 'ok'"
        [class.bg-yellow-500]="item.status === 'alerta'" [class.bg-red-600]="item.status === 'estourado'"></div>

    </div>

    <!-- ALERTA -->
    <div class="text-xs mt-1">

      <span *ngIf="item.status === 'alerta'" class="text-yellow-600">
        ⚠️ Atenção ao limite
      </span>

      <span *ngIf="item.status === 'estourado'" class="text-red-600">
        🚨 Orçamento estourado
      </span>

    </div>

  </div>

</div>
