<div class="bg-white rounded-xl shadow p-5 col-span-12 md:col-span-3">

  <h3 class="text-sm text-gray-500 mb-2">
    Score financeiro do mês
  </h3>

  <!-- 🔥 proteção -->
  <ng-container *ngIf="score as s">

    <div class="flex items-center gap-4">

      <div class="text-4xl font-bold" [ngClass]="{
        'text-red-500': s.score < 40,
        'text-yellow-500': s.score >= 40 && s.score < 70,
        'text-green-600': s.score >= 70
      }">
        {{ s.score }}
      </div>

      <div class="text-sm text-gray-500">
        {{ s.classificacao }}
      </div>

    </div>

    <div class="mt-4 space-y-2 text-xs">

      <div>
        Poupança: {{ s.metricas?.taxaPoupanca ?? 0 }}%
      </div>

      <div>
        Controle despesas: {{ s.metricas?.controleDespesas ?? 0 }}%
      </div>

      <div>
        Estabilidade: {{ s.metricas?.estabilidade ?? 0 }}%
      </div>

    </div>

  </ng-container>

</div>
