<div class="bg-white rounded-lg shadow p-4 h-full">

  <h3 class="text-lg font-semibold mb-4 text-gray-700">
    ⚠️ Alertas financeiros
  </h3>

  <div *ngFor="let a of alerts" class="text-sm py-2 border-b">

    <span [class.text-yellow-600]="a.tipo === 'ALERTA'" [class.text-red-600]="a.tipo === 'CRITICO'" class="font-medium">

      {{ a.mensagem }}

    </span>

  </div>

</div>
